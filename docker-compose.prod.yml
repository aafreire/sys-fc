services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sys_fc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-sys_fc_prod}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sys_fc}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: sys_fc_backend:prod
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      MIX_ENV: prod
      DATABASE_URL: ecto://${POSTGRES_USER:-sys_fc}:${POSTGRES_PASSWORD}@db/${POSTGRES_DB:-sys_fc_prod}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_SECONDS: ${JWT_EXPIRY_SECONDS:-604800}
      PHX_HOST: ${PHX_HOST}
      PORT: 4000
      PHX_SERVER: "true"
      POOL_SIZE: ${POOL_SIZE:-10}
      CORS_ORIGINS: ${CORS_ORIGINS}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-nebula-imagens}
      AWS_SES_REGION: ${AWS_SES_REGION:-us-east-1}
      AWS_SES_ACCESS_KEY: ${AWS_SES_ACCESS_KEY}
      AWS_SES_SECRET_KEY: ${AWS_SES_SECRET_KEY}
      MAIL_FROM_EMAIL: ${MAIL_FROM_EMAIL:-noreply@nebulagames.com.br}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-A.D de São Caetano Campo Limpo}
      ADMIN2_EMAIL: ${ADMIN2_EMAIL}
      ADMIN2_PASSWORD: ${ADMIN2_PASSWORD}
      ADMIN2_NAME: ${ADMIN2_NAME}
    ports:
      - "${PORT:-4000}:4000"

volumes:
  pg_data:
